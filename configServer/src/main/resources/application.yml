spring:
  application:
    name: "configserver"
  profiles:
    active: git
  #Native required only for local approach like class path and file system approach
  # active: native
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/MdAsifShamim/bank-config.git"
          default-label: "main"
          timeout: 5
          clone-on-start: true
          force-pull: true
        #Native required only for local approach like class path and file system approach
        #native:
         # search-locations: "file:///D://Spring Udemy//Microservices//workspace//section6//config"
        #search-locations: "classpath:/config"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
